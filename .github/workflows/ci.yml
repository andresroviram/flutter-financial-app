name: CI

on:
  push:
    branches: [main, develop, "**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  #  Análisis estático completo (todos los packages)
  # ──────────────────────────────────────────────
  analyze-and-test:
    name: Analyze, Format & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necesario para --diff de Melos

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Install Melos
        run: dart pub global activate melos

      - name: Create .env files (dev / qa / prod)
        run: |
          cat > apps/financial-app/.env.dev << EOF
          API_KEY=${{ secrets.FINANCIAL_DEV_API_KEY }}
          BASE_URL=${{ secrets.FINANCIAL_DEV_BASE_URL || 'http://localhost:3000' }}
          EOF
          cat > apps/financial-app/.env.qa << EOF
          API_KEY=${{ secrets.FINANCIAL_QA_API_KEY }}
          BASE_URL=${{ secrets.FINANCIAL_QA_BASE_URL || 'http://localhost:3000' }}
          EOF
          cat > apps/financial-app/.env.prod << EOF
          API_KEY=${{ secrets.FINANCIAL_PROD_API_KEY }}
          BASE_URL=${{ secrets.FINANCIAL_PROD_BASE_URL || 'http://localhost:3000' }}
          EOF

      - name: Melos Bootstrap (instala todas las dependencias del workspace)
        run: melos bootstrap

      - name: Run code generation (all packages)
        run: melos run build:financial-all

      - name: Verify formatting
        run: melos run format

      - name: Analyze all packages
        run: melos run analyze

      - name: Run tests (all packages)
        run: melos run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: |
            apps/financial-app/coverage/lcov.info
            packages/core/coverage/lcov.info
            packages/features/financial-app/funds/coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ──────────────────────────────────────────────
  #  Build Financial App Web
  # ──────────────────────────────────────────────
  build-financial-app-web:
    name: Build Financial App Web
    needs: analyze-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Install Melos
        run: dart pub global activate melos

      - name: Create .env files (dev / qa / prod)
        run: |
          cat > apps/financial-app/.env.dev << EOF
          API_KEY=${{ secrets.FINANCIAL_DEV_API_KEY }}
          BASE_URL=${{ secrets.FINANCIAL_DEV_BASE_URL || 'http://localhost:3000' }}
          EOF
          cat > apps/financial-app/.env.qa << EOF
          API_KEY=${{ secrets.FINANCIAL_QA_API_KEY }}
          BASE_URL=${{ secrets.FINANCIAL_QA_BASE_URL || 'http://localhost:3000' }}
          EOF
          cat > apps/financial-app/.env.prod << EOF
          API_KEY=${{ secrets.FINANCIAL_PROD_API_KEY }}
          BASE_URL=${{ secrets.FINANCIAL_PROD_BASE_URL || 'http://localhost:3000' }}
          EOF

      - name: Melos Bootstrap
        run: melos bootstrap

      - name: Code generation
        run: melos run build:financial-all

      - name: Determine flavor
        id: flavor
        run: |
          if [[ "${{ github.ref }}" == refs/heads/develop ]]; then
            echo "flavor=dev" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            echo "flavor=qa" >> $GITHUB_OUTPUT
          else
            echo "flavor=dev" >> $GITHUB_OUTPUT
          fi

      - name: Build Financial App Web
        run: cd apps/financial-app && flutter build web --release --dart-define=FLAVOR=${{ steps.flavor.outputs.flavor }}

      - name: Upload Financial App web artifact
        uses: actions/upload-artifact@v4
        with:
          name: financial-app-web-build-${{ github.sha }}
          path: apps/financial-app/build/web/
          retention-days: 7

  # ──────────────────────────────────────────────
  #  Build Financial App Android APK
  # ──────────────────────────────────────────────
  build-financial-app-android:
    name: Build Financial App Android APK
    needs: analyze-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Install Melos
        run: dart pub global activate melos

      - name: Create .env files (dev / qa / prod)
        run: |
          cat > apps/financial-app/.env.dev << EOF
          API_KEY=${{ secrets.FINANCIAL_DEV_API_KEY }}
          BASE_URL=${{ secrets.FINANCIAL_DEV_BASE_URL || 'http://localhost:3000' }}
          EOF
          cat > apps/financial-app/.env.qa << EOF
          API_KEY=${{ secrets.FINANCIAL_QA_API_KEY }}
          BASE_URL=${{ secrets.FINANCIAL_QA_BASE_URL || 'http://localhost:3000' }}
          EOF
          cat > apps/financial-app/.env.prod << EOF
          API_KEY=${{ secrets.FINANCIAL_PROD_API_KEY }}
          BASE_URL=${{ secrets.FINANCIAL_PROD_BASE_URL || 'http://localhost:3000' }}
          EOF

      - name: Melos Bootstrap
        run: melos bootstrap

      - name: Code generation
        run: melos run build:financial-all

      - name: Determine flavor
        id: flavor
        run: |
          if [[ "${{ github.ref }}" == refs/heads/develop ]]; then
            echo "flavor=dev" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            echo "flavor=qa" >> $GITHUB_OUTPUT
          else
            echo "flavor=dev" >> $GITHUB_OUTPUT
          fi

      - name: Build Financial App Android APK
        run: cd apps/financial-app && flutter build apk --release --dart-define=FLAVOR=${{ steps.flavor.outputs.flavor }}

      - name: Upload Financial App APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: financial-app-android-apk-${{ github.sha }}
          path: apps/financial-app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

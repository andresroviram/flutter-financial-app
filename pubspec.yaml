name: flutter_financial_app_workspace
publish_to: "none"

environment:
  sdk: ^3.8.0

workspace:
  - apps/financial-app
  - packages/core
  - packages/components
  - packages/features/financial-app/funds

dev_dependencies:
  melos: ^7.4.0

melos:
  repository: https://github.com/andresroviram/flutter-financial-app

  command:
    bootstrap:
      hooks:
        post: echo "✅ Bootstrap completado. Ejecuta 'melos run build:all' para generar código."

    version:
      workspaceChangelog: true
      linkToCommits: true
      commitMessage: "chore(release): version bump 🚀"

  scripts:
    analyze:
      exec: dart analyze .
      concurrency: 4
      description: Analiza todos los packages.

    analyze:changed:
      exec: dart analyze .
      concurrency: 4
      packageFilters:
        diff: origin/main
      description: Analiza solo los packages que cambiaron respecto a main.

    format:
      exec: find . -name "*.dart" ! -name "*.g.dart" ! -name "*.freezed.dart" ! -name "injectable.module.dart" ! -path "*/build/*" ! -path "*/.dart_tool/*" | xargs dart format --set-exit-if-changed
      concurrency: 4
      description: Verifica el formato de todos los packages (excluye archivos generados).

    format:fix:
      exec: find . -name "*.dart" ! -name "*.g.dart" ! -name "*.freezed.dart" ! -name "injectable.module.dart" ! -path "*/build/*" ! -path "*/.dart_tool/*" | xargs dart format
      concurrency: 4
      description: Aplica formato a todos los packages (excluye archivos generados).

    fix:
      exec: dart fix --apply
      concurrency: 1
      description: Aplica correcciones automáticas de lint (incluye directives_ordering, etc.) en todos los packages.

    build:financial-all:
      run: melos run build:core && melos run build:feature_funds && melos run build:financial-app && melos run build:web-worker:financial
      description: Genera código solo para financial-app y sus dependencias (sin client-app).

    build:core:
      exec: dart run build_runner build --delete-conflicting-outputs
      packageFilters:
        scope: core
      description: Genera código en el package core (drift, injectable, freezed).

    build:feature_funds:
      exec: dart run build_runner build --delete-conflicting-outputs
      packageFilters:
        scope: feature_funds
      description: Genera código en feature_funds (drift, injectable).

    build:financial-app:
      exec: dart run build_runner build --delete-conflicting-outputs
      packageFilters:
        scope: financial_app
      description: Genera código en la financial app (injectable, envied).

    build:web-worker:financial:
      run: cd apps/financial-app && dart compile js -O1 -o web/drift_worker.dart.js web/drift_worker.dart
      description: Recompila el web worker de Drift para financial-app.

    build:watch:
      exec: dart run build_runner watch --delete-conflicting-outputs
      packageFilters:
        dependsOn: build_runner
      description: Inicia build_runner en modo watch en todos los packages.

    clean:generated:
      exec: find . -name "*.g.dart" -o -name "*.freezed.dart" -delete
      description: Elimina todos los archivos generados.

    test:
      exec: flutter test
      concurrency: 4
      packageFilters:
        dirExists: test
      description: Ejecuta todos los tests.

    test:financial:
      exec: flutter test
      concurrency: 4
      packageFilters:
        dirExists: test
        scope: financial_app
      description: Ejecuta tests solo de financial-app.

    test:coverage:
      exec: flutter test --coverage
      concurrency: 1
      packageFilters:
        dirExists: test
      description: Ejecuta todos los tests con reporte de cobertura.

    test:changed:
      exec: flutter test
      concurrency: 4
      packageFilters:
        dirExists: test
        diff: origin/main
      description: Ejecuta tests solo de los packages que cambiaron.

    run:financial:mobile:
      run: cd $MELOS_ROOT_PATH/apps/financial-app && flutter run
      description: Lanza BTG Fondos en el simulador o dispositivo móvil.

    run:financial:web:
      run: cd $MELOS_ROOT_PATH/apps/financial-app && flutter run -d chrome --web-port 4002
      description: Lanza BTG Fondos en Chrome (puerto 4002).

    run:financial:desktop:
      run: cd $MELOS_ROOT_PATH/apps/financial-app && flutter run -d macos
      description: Lanza BTG Fondos en macOS Desktop.

    ci:
      run: melos run analyze && melos run format && melos run test
      description: Pipeline completo de CI.

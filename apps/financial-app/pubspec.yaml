name: financial_app
description: "Aplicación BTG Pactual – Gestión de Fondos (FPV/FIC)."
publish_to: "none"
resolution: workspace

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # Workspace packages
  core:
    path: ../../packages/core
  components:
    path: ../../packages/components
  feature_funds:
    path: ../../packages/features/financial-app/funds

  # UI
  adaptive_theme: ^3.7.2
  responsive_framework: ^1.5.1
  bot_toast: ^4.1.3
  cupertino_icons: ^1.0.8
  gap: ^3.0.1

  # Navigation
  go_router: ^17.1.0

  # State Management
  bloc: ^9.2.0
  flutter_bloc: ^9.1.1
  hydrated_bloc: ^10.1.1

  # Dependency Injection
  get_it: ^9.2.0
  injectable: ^2.7.1+4

  # Environment Variables
  envied: ^1.3.3

  # Utilities
  equatable: ^2.0.8
  intl: ^0.20.2
  easy_localization: ^3.0.8

  path_provider: ^2.1.5
  drift: ^2.24.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  mocktail: ^1.0.4
  bloc_test: ^10.0.0
  build_runner: ^2.10.5
  injectable_generator: ^2.9.0
  drift_dev: ^2.24.0
  envied_generator: ^1.3.3

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/img/
    - assets/translations/
